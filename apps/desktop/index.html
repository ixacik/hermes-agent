<!doctype html>
<!-- Monochrome dark is the only theme; .dark is set statically so Tailwind
     `dark:` utilities resolve without a JS theme provider. -->
<html lang="en" class="dark" data-hermes-mode="dark" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/apple-touch-icon.png" />
    <title>Hermes</title>
  </head>
  <body>
    <div id="root" class="scrollbar-dt"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
